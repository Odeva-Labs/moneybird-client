name: Ruby

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: checks

    strategy:
      matrix:
        ruby_version: [3.1, 3.2, 3.3, 3.4]

    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4

      - name: Set up Ruby
        uses: https://github.com/ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby_version }}

      - name: Exclude coverage group
        if: matrix.ruby_version != '3.4'
        run: bundle config set without coverage

      - name: Install dependencies
        run: |
          gem install bundler
          bundle install --jobs 4 --retry 3

      - name: Build and test with Rake
        env:
          CI: true
          COVERAGE: ${{ matrix.ruby_version == '3.4' && 'true' || '' }}
        run: bundle exec rake
