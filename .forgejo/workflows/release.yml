name: Release Gem

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: deploy
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v6

      - name: Set up Ruby
        uses: https://github.com/ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.4'

      - name: Verify tag matches gem version
        env:
          REF_NAME: ${{ forge.ref_name }}
        run: |
          version="$(ruby -I lib -e 'require "moneybird/version"; puts Moneybird::VERSION')"
          if [ "${REF_NAME#v}" != "$version" ]; then
            echo "tag ${REF_NAME} does not match gem version ${version}"
            exit 1
          fi

      - name: Install dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Run tests
        run: bundle exec rake

      - name: Build gem
        run: gem build moneybird.gemspec

      - name: Configure RubyGems credentials
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          mkdir -p ~/.gem
          cat > ~/.gem/credentials <<EOF
          ---
          :rubygems_api_key: ${RUBYGEMS_API_KEY}
          EOF
          chmod 0600 ~/.gem/credentials

      - name: Publish gem
        run: |
          version="$(ruby -I lib -e 'require "moneybird/version"; puts Moneybird::VERSION')"
          gem push "moneybird-client-${version}.gem"
